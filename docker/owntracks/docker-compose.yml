services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: openclaw-owntracks-mqtt
    command: ["mosquitto", "-c", "/mosquitto-no-auth.conf"]
    restart: unless-stopped

  recorder:
    image: owntracks/recorder:latest
    container_name: openclaw-owntracks-recorder
    depends_on:
      - mqtt
    environment:
      OTR_HOST: mqtt
      OTR_PORT: "1883"
    ports:
      - "127.0.0.1:18083:8083"
    restart: unless-stopped
    volumes:
      - /Users/mh/.openclaw/workspace/state/apple-find-my/owntracks/store:/store

  frontend:
    image: owntracks/frontend:latest
    container_name: openclaw-owntracks-frontend
    depends_on:
      - recorder
    environment:
      SERVER_HOST: recorder
      SERVER_PORT: "8083"
    ports:
      - "127.0.0.1:18084:80"
    restart: unless-stopped
    volumes:
      - /Users/mh/.openclaw/workspace/state/apple-find-my/owntracks/config/config.js:/usr/share/nginx/html/config/config.js:ro
